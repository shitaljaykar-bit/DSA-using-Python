name: Python DSA CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
    # 1. Check out the repository code
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Set up the Python environment
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # Caches dependencies to speed up subsequent workflow runs

    # 3. Install necessary testing and linting tools
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest black flake8

    # 4. Check formatting (Fails if code isn't styled properly according to Black)
    - name: Lint with Black (Code Formatter)
      run: |
        black --check .

    # 5. Check syntax and style violations
    - name: Lint with Flake8 (Style Guide)
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings.
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    # 6. Run your DSA problem unit tests
    - name: Run unit tests with pytest
      run: |
        pytest
